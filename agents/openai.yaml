interface:
  display_name: "School Report Builder"
  short_description: "Write Chinese university experiment, course design, internship, and software test reports from templates, screenshots, code, data, and tutorial pages"
  default_prompt: "Write or complete a Chinese university school report such as an experiment report, course design report, internship report, or software test report. If the user already provides enough facts for the report body, do not ask follow-up questions for optional metadata or template files; write the final report immediately. When the user gives the course name, experiment name, project name, or test project, write it explicitly into the final report body. Write the full report before touching any template, use scripts/extract-docx-template.ps1 first when a local docx template is available, keep claims aligned with the user's real screenshots and outputs, avoid inventing exact results, generate template mappings with scripts/generate-docx-field-map.ps1 when a docx template is provided, use paragraph arrays for long section content, prefer mode: after when a fixed heading should be preserved and the body belongs in the following blank paragraph, and use scripts/apply-docx-field-map.ps1 only when the user explicitly wants a filled local docx copy. Select the closest report profile with -ReportProfileName, for example experiment-report, course-design-report, internship-report, or software-test-report. If screenshots should be embedded into the final docx, prefer image specs or stable section anchors for scripts/generate-docx-image-map.ps1 and scripts/insert-docx-images.ps1. If the user asks for a template-border or original-frame copy, pass -CreateTemplateFrameDocx to the local, URL, or Feishu wrapper and report both finalDocxPath and templateFrameDocxPath."
