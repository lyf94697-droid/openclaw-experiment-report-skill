name: Smoke Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  smoke-tests:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run PowerShell smoke tests
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\scripts\run-smoke-tests.ps1
